<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Local Station Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="leaflet/leaflet.css" />

    <style>
        html, body, #map {
            height: 100%;
            margin: 0; padding: 0;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="leaflet/leaflet.js"></script>

<script>
    var map = L.map('map').setView([0, 0], 2);

    var CachedTileLayer = L.TileLayer.extend({
        createTile: function(coords, done) {
            var tile = document.createElement('img');
            tile.alt = '';
            tile.setAttribute('role', 'presentation');

            var z = coords.z;
            var x = coords.x;
            var y = coords.y;
            var onlineUrl = 'https://' + 'abc'[Math.abs(x + y) % 3]
                + '.tile.opentopomap.org/' + z + '/' + x + '/' + y + '.png';

            if (z <= 3) {
                tile.src = 'tiles/' + z + '/' + x + '/' + y + '.png';
                tile.onerror = function() {
                    tile.onerror = null;
                    tile.src = onlineUrl;
                };
            } else {
                tile.src = onlineUrl;
            }

            tile.onload = function() { done(null, tile); };
            return tile;
        }
    });

    new CachedTileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: 'Kartendaten: &copy; OpenStreetMap-Mitwirkende, SRTM | Kartendarstellung: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)'
    }).addTo(map);

    var stationLayer = L.layerGroup().addTo(map);

    function addStations(stations) {
        stationLayer.clearLayers();
        stations.forEach(function(station) {
            var marker = L.marker([station.lat, station.lon], {
                title: station.name,
                icon: L.divIcon({
                    className: 'triangle-icon',
                    html: `<div style="color: ${station.color}; font-size: 40px;">&#9650;</div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 40],
                })
            });
            marker.bindPopup('<b>' + station.name + '</b><br>Network: ' + station.network);
            stationLayer.addLayer(marker);
        });
    }

    function focusOnStation(lat, lon, zoom=10) {
        map.setView([lat, lon], zoom);
    }
</script>

<style>
    .triangle-icon {
        text-align: center;
    }
</style>

</body>
</html>
